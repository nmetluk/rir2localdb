# Optional observability stack: Prometheus + Grafana + Alertmanager.
# Запускается отдельно от main docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Или standalone (если api уже работает на хосте через systemd):
#
#   docker compose -f docker-compose.observability.yml up -d
#
# В standalone-варианте Prometheus scrape'ит api через host-network
# или через extra_hosts (см. deploy/prometheus/prometheus.yml comments).

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: rir2localdb-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rir2localdb-grafana
    volumes:
      - ./deploy/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/rir2localdb.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_INSTALL_PLUGINS: ""
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rir2localdb-alertmanager
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Telegram bot token mount — секрет файла, на хосте лежит в
      # /etc/rir2localdb/telegram_bot_token (0600 perm). Создать
      # перед запуском, иначе alertmanager упадёт.
      - /etc/rir2localdb/telegram_bot_token:/etc/alertmanager/telegram_bot_token:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
