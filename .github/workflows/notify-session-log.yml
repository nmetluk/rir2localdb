name: notify session log

on:
  push:
    branches: [main]
    paths:
      - '.claude/session-log/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: find changed session-log files in this push
        id: find
        run: |
          set -e
          before="${{ github.event.before }}"
          after="${{ github.event.after }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            files=$(git ls-tree -r --name-only "$after" -- .claude/session-log | grep '\.md$' | grep -v README || true)
          else
            files=$(git diff --name-only --diff-filter=AM "$before" "$after" -- '.claude/session-log/*.md' | grep -v README || true)
          fi
          latest=$(echo "$files" | sort -r | head -n1)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "Found session-log: $latest"

      - name: build message
        id: msg
        if: steps.find.outputs.latest != ''
        run: |
          file="${{ steps.find.outputs.latest }}"
          repo="${{ github.repository }}"
          sha_short=$(echo "${{ github.sha }}" | cut -c1-7)
          commit_url="https://github.com/${repo}/commit/${{ github.sha }}"
          file_url="https://github.com/${repo}/blob/main/${file}"

          body=$(head -c 3500 "$file")
          if [ "$(wc -c < "$file")" -gt 3500 ]; then
            body="${body}

…(обрезано, полностью: ${file_url})"
          fi

          {
            echo 'text<<EOF'
            echo "🟢 *${repo}* — новый session-log"
            echo ""
            echo "[\`${sha_short}\`](${commit_url}) → [\`${file}\`](${file_url})"
            echo ""
            echo '```'
            echo "$body"
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: send to Telegram
        if: steps.find.outputs.latest != ''
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEXT: ${{ steps.msg.outputs.text }}
        run: |
          curl -fsS "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
