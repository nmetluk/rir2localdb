name: notify session log

on:
  push:
    branches: [main]
    paths:
      - '.claude/session-log/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: find latest session-log
        id: find
        run: |
          set -e
          files=$(git ls-tree -r --name-only HEAD -- .claude/session-log/ \
            | grep '\.md$' \
            | grep -v -E '(README|_template)' \
            || true)

          if [ -z "$files" ]; then
            echo "No session-log files in repo — nothing to notify."
            echo "latest=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(echo "$files" | sort -r | head -n1)
          echo "Latest session-log: $latest"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: build and send notification
        if: steps.find.outputs.latest != ''
        run: |
          set -e
          file="${{ steps.find.outputs.latest }}"
          sha_short="${SHA:0:7}"
          commit_url="https://github.com/${REPO}/commit/${SHA}"
          file_url="https://github.com/${REPO}/blob/main/${file}"
          msg=/tmp/tg-message.txt

          {
            printf '🟢 <b>%s</b> — новый session-log\n\n' "$REPO"
            printf '<a href="%s"><code>%s</code></a> → <a href="%s"><code>%s</code></a>\n\n' \
              "$commit_url" "$sha_short" "$file_url" "$file"
            printf '<pre>'
            head -c 3500 "$file" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
            if [ "$(wc -c < "$file")" -gt 3500 ]; then
              printf '\n\n…(truncated, full file: %s)' "$file_url"
            fi
            printf '</pre>\n'
          } > "$msg"

          response_file=/tmp/tg-response.txt
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text@${msg}")

          echo "Telegram API HTTP code: $http_code"
          echo "Telegram API response body:"
          cat "$response_file"
          echo

          if [ "$http_code" != "200" ]; then
            echo "::error::Telegram API returned non-200 ($http_code)"
            exit 1
          fi
          if ! grep -q '"ok":true' "$response_file"; then
            echo "::error::Telegram API returned ok=false"
            exit 1
          fi

          echo "Notification sent successfully."
