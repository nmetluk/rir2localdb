name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rir2localdb
          POSTGRES_PASSWORD: rir2localdb
          POSTGRES_DB: rir2localdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rir2localdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      RIR2LOCALDB_DATABASE_URL: postgresql+asyncpg://rir2localdb:rir2localdb@localhost:5432/rir2localdb
      RIR2LOCALDB_TEST_DATABASE_URL: postgresql+asyncpg://rir2localdb:rir2localdb@localhost:5432/rir2localdb_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install
        run: pip install -e ".[dev]"

      - name: create test database
        env:
          PGPASSWORD: rir2localdb
        run: |
          psql -h localhost -U rir2localdb -d rir2localdb \
            -c "CREATE DATABASE rir2localdb_test;"

      - name: ruff check
        run: ruff check src/ tests/ src/rir2localdb/migrations/

      - name: ruff format check
        run: ruff format --check src/ tests/ src/rir2localdb/migrations/

      - name: mypy
        run: mypy src/ tests/

      - name: lint systemd units
        run: |
          # systemd-analyze verify — статический syntax check unit-файлов.
          # Подставляем dummy User=root и убираем ConditionPathExists,
          # потому что на CI runner'е rir2local юзера нет и venv не
          # существует — иначе verify падает.
          mkdir -p /tmp/systemd-lint
          sed -e 's/^User=.*/User=root/' \
              -e 's/^Group=.*/Group=root/' \
              -e '/^ConditionPathExists=/d' \
              -e 's|^WorkingDirectory=.*|WorkingDirectory=/tmp|' \
              -e 's|^ExecStart=.*|ExecStart=/bin/true|' \
              -e 's|^ReadWritePaths=.*|ReadWritePaths=/tmp|' \
              deploy/systemd/rir2localdb-sync.service \
              > /tmp/systemd-lint/rir2localdb-sync.service
          cp deploy/systemd/rir2localdb-sync.timer /tmp/systemd-lint/
          systemd-analyze verify \
            /tmp/systemd-lint/rir2localdb-sync.service \
            /tmp/systemd-lint/rir2localdb-sync.timer

      - name: alembic round-trip
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: pytest
        run: pytest tests/
